<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #e6e6e6;
    }

    #gameContainer {
      overflow: hidden;
    }

    #board {
      display: block;
      touch-action: manipulation;
      background: #d7a559;
      border-radius: 8px;
    }
  </style>
  <link
    rel="manifest"
    href="data:application/manifest+json,{%22name%22:%22Go%20Game%22,%22short_name%22:%22Go%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22%23000000%22,%22theme_color%22:%22%23000000%22}"
  >
</head>
<body>
  <div id="gameContainer">
    <canvas id="board"></canvas>
  </div>

  <script>
    (() => {
      const STAR_POINTS = {
        19: [3, 9, 15],
        13: [3, 6, 9],
        9: [2, 4, 6]
      };

      const STONE_RADIUS_FACTOR = 0.4;
      const DEFAULT_SIZE = 19;
      const POSITION_PARAM = "position";
      const TURN_PARAM = "turn";
      const MIN_SIZE = 5;
      const MAX_SIZE = 25;
      const MIN_BOARD_PX = 200;

      const canvas = document.getElementById("board");
      const ctx = canvas.getContext("2d");
      const gameContainer = document.getElementById("gameContainer");

      const state = createInitialState(getBoardSizeFromUrl());
      const view = {
        boardPx: 0,
        dpr: window.devicePixelRatio || 1
      };

      ctx.imageSmoothingEnabled = false;

      function normalizeBoardSize(value) {
        const parsed = parseInt(value, 10);
        return !Number.isNaN(parsed) && parsed >= MIN_SIZE && parsed <= MAX_SIZE
          ? parsed
          : DEFAULT_SIZE;
      }

      function getBoardSizeFromUrl() {
        const params = new URLSearchParams(window.location.search);
        return normalizeBoardSize(params.get("size") || String(DEFAULT_SIZE));
      }

      function ensureUrlDefaults() {
        const params = new URLSearchParams(window.location.search);
        const normalizedSize = normalizeBoardSize(params.get("size") || String(DEFAULT_SIZE));
        const normalizedTurn = params.get(TURN_PARAM) === "w" ? "w" : "b";

        let changed = false;

        if (params.get("size") !== String(normalizedSize)) {
          params.set("size", String(normalizedSize));
          changed = true;
        }

        if (params.get(TURN_PARAM) !== normalizedTurn) {
          params.set(TURN_PARAM, normalizedTurn);
          changed = true;
        }

        if (changed) {
          const query = params.toString();
          const nextUrl = `${window.location.pathname}${query ? `?${query}` : ""}${window.location.hash}`;
          window.history.replaceState(null, "", nextUrl);
        }
      }

      function encodePosition(board) {
        return board
          .map(row => {
            let encoded = "";
            let emptyCount = 0;

            for (const cell of row) {
              if (cell === null) {
                emptyCount++;
                continue;
              }

              if (emptyCount > 0) {
                encoded += String(emptyCount);
                emptyCount = 0;
              }

              encoded += cell === "black" ? "b" : "w";
            }

            if (emptyCount > 0) {
              encoded += String(emptyCount);
            }

            return encoded;
          })
          .join("|");
      }

      function syncUrlToState() {
        const params = new URLSearchParams(window.location.search);
        const sizeValue = String(state.size);
        const turnValue = state.current === "white" ? "w" : "b";
        const positionValue = encodePosition(state.board);

        params.set("size", sizeValue);
        params.set(TURN_PARAM, turnValue);
        params.set(POSITION_PARAM, positionValue);

        const query = params.toString();
        const nextUrl = `${window.location.pathname}${query ? `?${query}` : ""}${window.location.hash}`;
        window.history.replaceState(null, "", nextUrl);
      }

      function parsePosition(positionText, size) {
        if (!positionText) return createBoard(size);

        const rows = positionText.trim().split("|");
        if (rows.length !== size) return createBoard(size);

        const board = createBoard(size);

        for (let row = 0; row < size; row++) {
          const rowStr = rows[row];
          let col = 0;

          for (let i = 0; i < rowStr.length; i++) {
            const ch = rowStr[i];

            // number = consecutive empty cells
            if (!isNaN(ch)) {
              let numStr = ch;
              while (i + 1 < rowStr.length && !isNaN(rowStr[i + 1])) {
                numStr += rowStr[++i];
              }

              const count = parseInt(numStr, 10);
              col += count;
              continue;
            }

            if (col >= size) return createBoard(size);

            if (ch === "b") board[row][col] = "black";
            else if (ch === "w") board[row][col] = "white";
            else return createBoard(size);

            col++;
          }

          if (col !== size) return createBoard(size);
        }

        return board;
      }

      function getBoardFromUrl(size) {
        const params = new URLSearchParams(window.location.search);
        return parsePosition(params.get(POSITION_PARAM), size);
      }

      function parseTurn(turnValue) {
        if (turnValue === "w") return "white";
        return "black";
      }

      function getTurnFromUrl() {
        const params = new URLSearchParams(window.location.search);
        return parseTurn(params.get(TURN_PARAM));
      }

      function createBoard(size) {
        return Array.from({ length: size }, () => Array(size).fill(null));
      }

      function createInitialState(size) {
        return {
          size,
          board: getBoardFromUrl(size),
          current: getTurnFromUrl(),
          captures: { black: 0, white: 0 },
          lastBoardHash: null
        };
      }

      function getOpponent(color) {
        return color === "black" ? "white" : "black";
      }

      function cloneBoard(board) {
        return board.map(row => row.slice());
      }

      function hashBoard(board) {
        return board
          .map(row => row.map(cell => (cell ? cell[0] : "_")).join(""))
          .join("|");
      }

      function getGridSize() {
        return view.boardPx / (state.size + 1);
      }

      function getNeighbors(row, col) {
        const neighbors = [];
        const { size } = state;

        if (row > 0) neighbors.push([row - 1, col]);
        if (row < size - 1) neighbors.push([row + 1, col]);
        if (col > 0) neighbors.push([row, col - 1]);
        if (col < size - 1) neighbors.push([row, col + 1]);

        return neighbors;
      }

      function findGroup(startRow, startCol, visited = new Set()) {
        const color = state.board[startRow][startCol];
        const key = `${startRow},${startCol}`;

        if (visited.has(key)) {
          return { stones: [], liberties: 0 };
        }

        visited.add(key);

        let stones = [[startRow, startCol]];
        let liberties = 0;

        for (const [row, col] of getNeighbors(startRow, startCol)) {
          const cell = state.board[row][col];

          if (cell === null) {
            liberties++;
            continue;
          }

          if (cell === color) {
            const group = findGroup(row, col, visited);
            stones = stones.concat(group.stones);
            liberties += group.liberties;
          }
        }

        return { stones, liberties };
      }

      function removeGroup(group) {
        for (const [row, col] of group) {
          state.board[row][col] = null;
        }
      }

      function updateHUD() {
        gameContainer.style.background = state.current === "black" ? "#000" : "#fff";
      }

      function resizeBoard() {
        const isPortrait = window.innerHeight >= window.innerWidth;
        const baseSize = isPortrait ? window.innerWidth : window.innerHeight;

        view.boardPx = Math.max(MIN_BOARD_PX, Math.floor(baseSize));

        canvas.style.width = `${view.boardPx}px`;
        canvas.style.height = `${view.boardPx}px`;
        canvas.width = view.boardPx * view.dpr;
        canvas.height = view.boardPx * view.dpr;

        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.scale(view.dpr, view.dpr);

        render();
      }

      function drawBoard() {
        const gs = getGridSize();
        const stars = STAR_POINTS[state.size] || [];
        const starRadius = Math.max(2, gs * 0.12);

        ctx.clearRect(0, 0, view.boardPx, view.boardPx);
        ctx.fillStyle = "#d7a559";
        ctx.fillRect(0, 0, view.boardPx, view.boardPx);

        ctx.strokeStyle = "#000";
        ctx.lineWidth = Math.max(1, Math.round(gs * 0.03));

        for (let i = 1; i <= state.size; i++) {
          ctx.beginPath();
          ctx.moveTo(gs, gs * i);
          ctx.lineTo(gs * state.size, gs * i);
          ctx.stroke();

          ctx.beginPath();
          ctx.moveTo(gs * i, gs);
          ctx.lineTo(gs * i, gs * state.size);
          ctx.stroke();
        }

        ctx.fillStyle = "#000";
        for (const row of stars) {
          for (const col of stars) {
            ctx.beginPath();
            ctx.arc((col + 1) * gs, (row + 1) * gs, starRadius, 0, Math.PI * 2);
            ctx.fill();
          }
        }
      }

      function drawStone(x, y, radius, color) {
        const gradient = ctx.createRadialGradient(
          x - radius * 0.3,
          y - radius * 0.3,
          radius * 0.1,
          x,
          y,
          radius
        );

        if (color === "black") {
          gradient.addColorStop(0, "#555");
          gradient.addColorStop(0.5, "#000");
          gradient.addColorStop(1, "#000");
        } else {
          gradient.addColorStop(0, "#fff");
          gradient.addColorStop(0.5, "#eee");
          gradient.addColorStop(1, "#ddd");
        }

        ctx.beginPath();
        ctx.arc(x, y, radius, 0, Math.PI * 2);
        ctx.fillStyle = gradient;
        ctx.fill();
      }

      function drawStones() {
        const gs = getGridSize();
        const radius = Math.max(4, gs * STONE_RADIUS_FACTOR);

        for (let row = 0; row < state.size; row++) {
          for (let col = 0; col < state.size; col++) {
            const stone = state.board[row][col];
            if (!stone) continue;

            drawStone((col + 1) * gs, (row + 1) * gs, radius, stone);
          }
        }
      }

      function drawDifference() {
        const diff = state.captures.white - state.captures.black;
        if (diff === 0) return;

        const text = `${diff > 0 ? "+" : ""}${diff}`;
        const fontSize = Math.floor(canvas.width * 0.42);

        ctx.save();
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.font = `700 ${fontSize}px sans-serif`;
        ctx.fillStyle = "rgba(0,0,0,0.12)";
        ctx.fillText(text, canvas.width / 2, canvas.width / 2);
        ctx.lineWidth = Math.max(2, Math.round(fontSize * 0.02));
        ctx.strokeStyle = "rgba(0,0,0,0.18)";
        ctx.strokeText(text, canvas.width / 2, canvas.width / 2);
        ctx.restore();
      }

      function render() {
        drawBoard();
        drawStones();
        drawDifference();
      }

      function getBoardPosition(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        const gs = getGridSize();

        return {
          row: Math.round((clientY - rect.top) / gs) - 1,
          col: Math.round((clientX - rect.left) / gs) - 1
        };
      }

      function isInsideBoard(row, col) {
        return row >= 0 && row < state.size && col >= 0 && col < state.size;
      }

      function tryCaptureOpponents(row, col, opponent) {
        let capturedCount = 0;

        for (const [neighborRow, neighborCol] of getNeighbors(row, col)) {
          if (state.board[neighborRow][neighborCol] !== opponent) continue;

          const group = findGroup(neighborRow, neighborCol);
          if (group.liberties === 0) {
            removeGroup(group.stones);
            capturedCount += group.stones.length;
          }
        }

        return capturedCount;
      }

      function rollbackMove(previousBoard) {
        state.board = previousBoard;
      }

      function commitMove(previousHash, capturedCount, nextPlayer) {
        state.captures[state.current] += capturedCount;
        state.lastBoardHash = previousHash;
        state.current = nextPlayer;
        updateHUD();
        render();
        syncUrlToState();
      }

      function handleMove(row, col) {
        if (!isInsideBoard(row, col)) return;
        if (state.board[row][col] !== null) return;

        const previousBoard = cloneBoard(state.board);
        const previousHash = hashBoard(previousBoard);
        const currentPlayer = state.current;
        const opponent = getOpponent(currentPlayer);

        state.board[row][col] = currentPlayer;

        const capturedCount = tryCaptureOpponents(row, col, opponent);
        const ownGroup = findGroup(row, col);

        if (ownGroup.liberties === 0) {
          rollbackMove(previousBoard);
          return;
        }

        const newHash = hashBoard(state.board);
        if (newHash === state.lastBoardHash) {
          rollbackMove(previousBoard);
          return;
        }

        commitMove(previousHash, capturedCount, opponent);
      }

      function onBoardClick(event) {
        const { row, col } = getBoardPosition(event.clientX, event.clientY);
        handleMove(row, col);
      }

      function bindEvents() {
        canvas.addEventListener("click", onBoardClick);
        window.addEventListener("resize", resizeBoard);
      }

      function registerServiceWorker() {
        navigator.serviceWorker?.register("service-worker.js");
      }

      function init() {
        ensureUrlDefaults();
        bindEvents();
        resizeBoard();
        updateHUD();
        syncUrlToState();
        registerServiceWorker();
      }

      init();
    })();
  </script>
</body>
</html>
